{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LCD Inventory{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'LCD/css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="nav-shell" aria-label="Main navigation">
            <a class="brand-mark" href="{% url 'LCD:lcd_list' %}">
                <span class="brand-icon">LCD</span>
                <span>
                    <strong>Dayi Iman</strong>
                    <small>Inventory</small>
                </span>
            </a>

            <div class="nav-links">
                <a href="{% url 'LCD:lcd_list' %}">Home</a>
                <a href="{% url 'LCD:lcd_create' %}">Create LCD</a>
                <a href="{% url 'LCD:brand_list' %}">Brands</a>
                <a href="{% url 'LCD:brand_create' %}">Create Brand</a>
            </div>
        </nav>
    </header>

    <main class="page-shell">
        {% if messages %}
            <section class="messages" aria-label="Messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
